<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ / สมัครสมาชิก - เที่ยวเมืองเพชร</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col justify-between">

    <div class="p-4">
        <div class="container mx-auto">
            <a href="index.html" class="btn btn-ghost text-emerald-700 font-bold hover:bg-emerald-50">
                ← กลับหน้าหลัก
            </a>
        </div>
    </div>

    <main class="flex-grow flex items-center justify-center px-4 py-10">
        <div class="card bg-white w-full max-w-md shadow-xl border border-stone-200/80 p-8 rounded-3xl">
            
            <div role="tablist" class="tabs tabs-boxed bg-stone-100 p-1 mb-8 rounded-2xl">
                <input type="radio" name="auth_tabs" id="tab-login" role="tab" class="tab text-emerald-800 font-bold [--tab-bg:white]" aria-label="เข้าสู่ระบบ" checked="checked" />
                <div role="tabpanel" class="tab-content pt-6">
                    <form id="loginForm" class="space-y-4">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-stone-900">ยินดีต้อนรับกลับมา 👋</h2>
                            <p class="text-sm text-stone-500 mt-1">เข้าสู่ระบบเพื่อเขียนรีวิวสถานที่ท่องเที่ยว</p>
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium text-stone-700">อีเมล หรือ ชื่อผู้ใช้งาน</span></label>
                            <input type="text" id="loginEmail" placeholder="example@email.com " class="input input-bordered w-full rounded-xl border-stone-300 focus:border-emerald-500 focus:outline-none" required />
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium text-stone-700">รหัสผ่าน</span></label>
                            <input type="password" id="loginPassword" placeholder="••••••••" class="input input-bordered w-full rounded-xl border-stone-300 focus:border-emerald-500 focus:outline-none" required />
                        </div>

                        <button type="submit" class="btn bg-emerald-800 hover:bg-emerald-900 text-white w-full rounded-xl border-none mt-4 shadow-md">
                            เข้าสู่ระบบ
                        </button>
                    </form>
                </div>

                <input type="radio" name="auth_tabs" id="tab-register" role="tab" class="tab text-emerald-800 font-bold [--tab-bg:white]" aria-label="สมัครสมาชิก" />
                <div role="tabpanel" class="tab-content pt-6">
                    <form id="registerForm" class="space-y-4">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-stone-900">สร้างบัญชีใหม่ ✨</h2>
                            <p class="text-sm text-stone-500 mt-1">ร่วมเป็นส่วนหนึ่งของชุมชนคนชอบเที่ยว</p>
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium text-stone-700">ชื่อผู้ใช้งาน</span></label>
                            <input type="text" id="regUsername" placeholder="ชื่อของคุณ" class="input input-bordered w-full rounded-xl border-stone-300 focus:border-emerald-500 focus:outline-none" required />
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium text-stone-700">อีเมล</span></label>
                            <input type="email" id="regEmail" placeholder="example@email.com" class="input input-bordered w-full rounded-xl border-stone-300 focus:border-emerald-500 focus:outline-none" required />
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium text-stone-700">รหัสผ่าน</span></label>
                            <input type="password" id="regPassword" placeholder="ตั้งรหัสผ่านอย่างน้อย 6 ตัวอักษร" class="input input-bordered w-full rounded-xl border-stone-300 focus:border-emerald-500 focus:outline-none" required />
                        </div>

                        <div class="form-control pt-2">
                            <label class="flex items-start gap-2 cursor-pointer text-xs leading-relaxed">
                                <input type="checkbox" class="checkbox checkbox-xs checkbox-emerald rounded mt-0.5" required />
                                <span class="text-stone-600">ฉันยอมรับเงื่อนไขการใช้งานและนโยบายความเป็นส่วนตัว</span>
                            </label>
                        </div>

                        <button type="submit" class="btn bg-emerald-800 hover:bg-emerald-900 text-white w-full rounded-xl border-none mt-4 shadow-md">
                            สมัครสมาชิก
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <footer class="p-4 text-center text-xs text-stone-400 border-t border-stone-200/60 bg-white">
        © 2026 อำเภอเมืองเพชรบุรี & แก่งกระจาน ท่องเที่ยวไทย. All rights reserved.
    </footer>

    <script>
        // 1. ระบบสมัครสมาชิก
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // ป้องกันไม่ให้คนทั่วไปตั้งชื่อเป็นแอดมิน
            if (username.toLowerCase().trim() === 'admin') {
                alert('❌ ไม่สามารถใช้ชื่อผู้ใช้งาน "admin" ได้ เนื่องจากเป็นชื่อระบบของผู้ดูแลค่ะ!');
                return;
            }

            let users = JSON.parse(localStorage.getItem('web_users')) || [];

            const isEmailExist = users.some(user => user.email === email);
            if (isEmailExist) {
                alert('❌ อีเมลนี้ถูกใช้สมัครสมาชิกไปแล้วค่ะ!');
                return;
            }

            users.push({ username: username, email: email, password: password });
            localStorage.setItem('web_users', JSON.stringify(users));

            alert('✨ สมัครสมาชิกสำเร็จแล้ว! ระบบจะสลับไปหน้าเข้าสู่ระบบให้ค่ะ');
            this.reset();
            document.getElementById('tab-login').checked = true;
        });

        // 2. ระบบเข้าสู่ระบบ
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const emailOrUsername = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            // ดักจับบัญชี Admin สูงสุด
            if (emailOrUsername.toLowerCase() === 'admin') {
                if (password === 'admin') {
                    const adminUser = {
                        username: 'admin',
                        email: 'admin@email.com'
                    };
                    localStorage.setItem('currentUser', JSON.stringify(adminUser));
                    alert(`🛠️ ยินดีต้อนรับเข้าสู่ระบบในฐานะ [ผู้ดูแลระบบสูงสุด] (Admin) ค่ะ!`);
                    window.location.href = 'index.html';
                    return; 
                }
            }

            // ระบบสำหรับสมาชิกทั่วไป
            let users = JSON.parse(localStorage.getItem('web_users')) || [];
            const userFound = users.find(user => (user.email === emailOrUsername || user.username === emailOrUsername) && user.password === password);

            if (userFound) {
                localStorage.setItem('currentUser', JSON.stringify(userFound));
                alert(`👋 ยินดีต้อนรับคุณ ${userFound.username} เข้าสู่ระบบสำเร็จ!`);
                window.location.href = 'index.html';
            } else {
                alert('❌ ข้อมูลไม่ถูกต้อง กรุณาลองใหม่อีกครั้งค่ะ\n(สำหรับ Admin: พิมพ์ช่องแรกว่า admin รหัสผ่าน admin ค่ะ)');
            }
        });
    </script>

</body>
</html>
